{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Bilingual language toggle (English default, 日本語 optional) -->
<style>
  .lang-ja { display: none; }
  html[data-lang="ja"] .lang-en { display: none; }
  html[data-lang="ja"] div.lang-ja,
  html[data-lang="ja"] p.lang-ja { display: block; }
  span.lang-ja, a.lang-ja { display: none; }
  html[data-lang="ja"] span.lang-en,
  html[data-lang="ja"] a.lang-en { display: none; }
  html[data-lang="ja"] span.lang-ja,
  html[data-lang="ja"] a.lang-ja { display: inline; }
  #lang-toggle a { cursor: pointer; font-weight: bold; }
  /* Make in-content section headings one size smaller than the page title (25px -> 20px). */
  .page__content h1,
  .archive h1:not(.page__title) { font-size: 1.25em; }
  /* Push the language toggle and theme button to the right edge of the header.
     (Paired with a patched greedy-nav that measures item widths, not container width.) */
  .greedy-nav .visible-links { display: flex; align-items: center; width: 100%; }
  .greedy-nav .visible-links li { display: block; flex: 0 0 auto; }
  .greedy-nav .visible-links #lang-toggle { margin-left: auto; }
</style>
<script>
  /* Set the initial language early to avoid a flash of the wrong language. */
  (function () { var l = 'en'; try { l = localStorage.getItem('site-lang') || 'en'; } catch (e) {} document.documentElement.setAttribute('data-lang', l); })();
  /* Toggle handler (event delegation so it works even if the nav moves the button). */
  document.addEventListener('click', function (e) { var el = e.target.closest ? e.target.closest('#lang-toggle a') : null; if (!el) { return; } e.preventDefault(); var cur = document.documentElement.getAttribute('data-lang') === 'ja' ? 'ja' : 'en'; var next = cur === 'ja' ? 'en' : 'ja'; document.documentElement.setAttribute('data-lang', next); try { localStorage.setItem('site-lang', next); } catch (e2) {} });
</script>

<!-- end custom head snippets -->
